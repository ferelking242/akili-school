name: scolaris
description: "Scolaris - Savoir, Héritage, Avenir."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  intl: any

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # Theme
  flex_color_scheme: ^8.1.1

  # Responsive
  flutter_screenutil: ^5.9.3
  responsive_framework: ^1.5.1

  # Desktop
  fluent_ui: ^4.9.2
  bitsdojo_window: ^0.1.6

  # Mobile UI
  animations: ^2.0.11
  salomon_bottom_bar: ^3.3.2

  # Data viz
  fl_chart: ^0.69.0
  syncfusion_flutter_datagrid: ^27.1.48

  # UI kit
  lottie: ^3.1.2
  flutter_staggered_grid_view: ^0.7.0

  # QR
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Localization
  easy_localization: ^3.0.7

  # Supabase
  supabase_flutter: ^2.6.0

  # Skeleton / shimmer loading
  shimmer: ^3.0.0

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.0
  collection: ^1.18.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/lottie/
