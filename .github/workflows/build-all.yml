name: Build All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.32.0'

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # 1. Android — built FIRST, every ABI
  # ────────────────────────────────────────────────────────────────────────
  android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: armeabi-v7a
            target: android-arm
          - abi: arm64-v8a
            target: android-arm64
          - abi: x86_64
            target: android-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build APK (${{ matrix.abi }})
        run: flutter build apk --release --target-platform ${{ matrix.target }} --split-per-abi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: akili-school-android-${{ matrix.abi }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

  android-bundle:
    name: Android App Bundle (AAB)
    runs-on: ubuntu-latest
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: akili-school-android-aab
          path: build/app/outputs/bundle/release/*.aab
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────
  # 2. iOS (no codesign — produces an unsigned .app archive)
  # ────────────────────────────────────────────────────────────────────────
  ios:
    name: iOS
    runs-on: macos-latest
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
      - name: Package
        run: |
          mkdir -p artifacts
          cd build/ios/iphoneos
          zip -r ../../../artifacts/akili-school-ios.zip Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: akili-school-ios
          path: artifacts/akili-school-ios.zip

  # ────────────────────────────────────────────────────────────────────────
  # 3. Web
  # ────────────────────────────────────────────────────────────────────────
  web:
    name: Web
    runs-on: ubuntu-latest
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release --base-href "/"
      - uses: actions/upload-artifact@v4
        with:
          name: akili-school-web
          path: build/web

  # ────────────────────────────────────────────────────────────────────────
  # 4. Linux desktop
  # ────────────────────────────────────────────────────────────────────────
  linux:
    name: Linux Desktop
    runs-on: ubuntu-latest
    needs: android
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev clang cmake pkg-config liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package
        run: |
          mkdir -p artifacts
          cd build/linux/x64/release/bundle
          tar czf ../../../../../artifacts/akili-school-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: akili-school-linux
          path: artifacts/akili-school-linux-x64.tar.gz

  # ────────────────────────────────────────────────────────────────────────
  # 5. Windows desktop
  # ────────────────────────────────────────────────────────────────────────
  windows:
    name: Windows Desktop
    runs-on: windows-latest
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: |
          mkdir artifacts
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath artifacts/akili-school-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: akili-school-windows
          path: artifacts/akili-school-windows-x64.zip

  # ────────────────────────────────────────────────────────────────────────
  # 6. macOS desktop
  # ────────────────────────────────────────────────────────────────────────
  macos:
    name: macOS Desktop
    runs-on: macos-latest
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package
        run: |
          mkdir -p artifacts
          cd build/macos/Build/Products/Release
          zip -r ../../../../../artifacts/akili-school-macos.zip akili_school.app
      - uses: actions/upload-artifact@v4
        with:
          name: akili-school-macos
          path: artifacts/akili-school-macos.zip
